# GopherStack Enterprise - Auto-Generated Nginx Configuration
# DO NOT EDIT THIS FILE MANUALLY - It will be overwritten on reload

worker_processes auto;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format upstream_stats '$upstream_addr';
    access_log  "../../logs/nginx_access.log";
    error_log   "../../logs/nginx_error.log";

    # Performance tuning for Windows
    sendfile        off;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    types_hash_max_size 2048;
    client_max_body_size 100m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    
    # PHP FastCGI upstream pool for site: app_php84
    upstream php_pool_app_php84 {
        
        server 127.0.0.1:9001 max_fails=3 fail_timeout=5s;
        
