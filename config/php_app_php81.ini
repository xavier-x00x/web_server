[PHP]
extension_dir = "D:/Workspace/Experimen/web_server/bin/php/8.1.10/ext"
memory_limit = 128M


max_execution_time = 300
upload_max_filesize = 100M
post_max_size = 100M
display_errors = Off
log_errors = On
error_log = "../logs/php_errors_app_php81.log"

[opcache]
zend_extension=opcache
opcache.enable=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=4000
opcache.revalidate_freq=60
opcache.fast_shutdown=1

[ExtensionList]
; Common extensions usually enabled in Windows builds
extension=curl
extension=fileinfo
extension=gd
extension=mbstring
extension=openssl
extension=pdo_mysql
extension=sqlite3
extension=pdo_sqlite
